version: 2
updates:
  - package-ecosystem: pip
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
      include: scope
    labels:
      - dependencies
    groups:
      patches-and-minors:
        update-types:
          - patch
          - minor

  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
      include: scope
    labels:
      - dependencies
    groups:
      patches-and-minors:
        update-types:
          - patch
          - minor

  - package-ecosystem: npm
    directory: /frontend
    target-branch: develop
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
      include: scope
    labels:
      - dependencies
    groups:
      patches-and-minors:
        update-types:
          - patch
          - minor

  - package-ecosystem: docker
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
      include: scope
    labels:
      - dependencies
